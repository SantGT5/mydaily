services:
  backend:
    build:
      context: ../
      dockerfile: docker/stack/backend/Dockerfile.local
    volumes:
      - ../backend:/app

  postgres:
    ports:
      - 5432:5432

  caddy:
    volumes:
      - ./caddy/local/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
