repos:
  # Check commit message
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          [
            --strict,
            --verbose,
            ci,
            fix,
            ref,
            feat,
            test,
            docs,
            perf,
            debug,
            chore,
            build,
            style,
            revert,
          ]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: \.(go|mod|sum|txt|md|yaml|yml|json|toml|sql|sh)$
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: debug-statements
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: pretty-format-json
        args: ["--autofix", "--no-sort-keys"]
      - id: detect-private-key
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-shebang-scripts-are-executable
        exclude: backend/entrypoint
      - id: check-symlinks
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: bash -c 'cd backend && go fmt ./...'
        language: system
        pass_filenames: false
        files: \.go$
      - id: go-vet
        name: go vet
        entry: bash -c 'cd backend && go vet ./...'
        language: system
        pass_filenames: false
        files: \.go$
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'cd backend && golangci-lint run'
        language: system
        pass_filenames: false
        files: \.go$
